<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>PoE2 Gear Coach</title>
  <style>
    /* ── PoE2 colour palette (mirrors in-game tooltip colours) ── */
    :root {
      --poe-bg:          #0d0b08;
      --poe-bg-card:     #110f0b;
      --poe-border:      #5c4a1e;
      --poe-border-dim:  #3a2f10;
      --poe-gold:        #af8c54;
      --poe-gold-bright: #c8a96e;
      --poe-rare:        #ffef99;
      --poe-magic:       #8888ff;
      --poe-unique:      #af6025;
      --poe-normal:      #c8c8c8;
      --poe-gem:         #1aa76d;
      --poe-mod:         #8888ff;
      --poe-fire:        #e05030;
      --poe-cold:        #6090e0;
      --poe-lightning:   #c8b400;
      --poe-chaos:       #d02090;
      --poe-life:        #d03020;
      --poe-white:       #c8c8c8;
      --poe-muted:       #7f7f7f;
      --poe-separator:   #4b3a1e;

      /* verdict colours */
      --good:   #78d49a;
      --warn:   #ffd166;
      --bad:    #ff8b8b;
      --accent: #78a6ff;

      --font-body: "Fontin SmallCaps", "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Consolas", monospace;
      --radius: 4px;
      --shadow: 0 8px 40px rgba(0,0,0,0.85), 0 0 0 1px rgba(92,74,30,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      font-family: var(--font-body);
      color: var(--poe-white);
      width: 700px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* ── Outer shell ───────────────────────────────────────────── */
    #shell {
      display: none;
      background: var(--poe-bg);
      border: 1px solid var(--poe-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    #shell.visible { display: flex; flex-direction: column; }

    /* ── Drag handle / title bar ───────────────────────────────── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px 6px;
      background: linear-gradient(180deg, #1a1508 0%, #110f08 100%);
      border-bottom: 1px solid var(--poe-border-dim);
      -webkit-app-region: drag;
    }
    #titlebar-left {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--poe-gold); letter-spacing: 0.1em;
      text-transform: uppercase; font-weight: 700;
    }
    #titlebar-right {
      display: flex; gap: 6px; align-items: center;
      -webkit-app-region: no-drag;
    }
    .tb-btn {
      background: none; border: 1px solid var(--poe-border-dim); border-radius: 3px;
      color: var(--poe-muted); font-size: 11px; padding: 3px 8px;
      cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
      transition: color 0.12s, border-color 0.12s;
    }
    .tb-btn:hover { color: var(--poe-gold); border-color: var(--poe-border); }
    #close-btn { font-size: 14px; padding: 2px 7px; }
    #close-btn:hover { color: var(--bad); border-color: var(--bad); }

    /* ── Stage / slot selectors ────────────────────────────────── */
    #selectors {
      display: flex; gap: 8px; align-items: center;
      padding: 7px 12px; background: #0d0b08;
      border-bottom: 1px solid var(--poe-border-dim);
    }
    .sel-label { font-size: 11px; color: var(--poe-muted); white-space: nowrap; }
    #selectors select {
      flex: 1; background: #1a1508; border: 1px solid var(--poe-border-dim);
      border-radius: 3px; color: var(--poe-gold); font-size: 12px;
      font-family: inherit; padding: 4px 6px; cursor: pointer;
    }
    #selectors select:focus { outline: none; border-color: var(--poe-border); }

    /* ── Body: two-column layout ───────────────────────────────── */
    #body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    /* ── LEFT: PoE-style item tooltip ──────────────────────────── */
    #item-tooltip {
      border-right: 1px solid var(--poe-border-dim);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 0;
      min-width: 0;
    }

    /* Item header */
    .item-header { text-align: center; margin-bottom: 6px; }
    .item-rarity-bar {
      height: 3px; border-radius: 2px; margin-bottom: 8px;
      background: var(--poe-gold);
    }
    .item-rarity-bar.rare    { background: linear-gradient(90deg, transparent, #c8b400, transparent); }
    .item-rarity-bar.magic   { background: linear-gradient(90deg, transparent, #8888ff, transparent); }
    .item-rarity-bar.unique  { background: linear-gradient(90deg, transparent, #af6025, transparent); }
    .item-rarity-bar.normal  { background: linear-gradient(90deg, transparent, #7f7f7f, transparent); }

    .item-name {
      font-size: 17px; font-weight: 700; letter-spacing: 0.02em;
      line-height: 1.2; margin-bottom: 1px;
    }
    .item-name.rare    { color: var(--poe-rare); }
    .item-name.magic   { color: var(--poe-magic); }
    .item-name.unique  { color: var(--poe-unique); }
    .item-name.normal  { color: var(--poe-normal); }

    .item-base { font-size: 13px; color: var(--poe-white); }

    /* Separator */
    .sep {
      width: 100%; height: 1px; margin: 7px 0;
      background: linear-gradient(90deg, transparent, var(--poe-separator) 30%, var(--poe-separator) 70%, transparent);
    }

    /* Property rows */
    .prop-row { display: flex; justify-content: space-between; gap: 8px; }
    .prop-label { color: var(--poe-white); font-size: 13px; }
    .prop-val   { color: var(--poe-blue, #8888ff); font-size: 13px; font-weight: 600; }
    .prop-val.aug { color: #8888ff; }
    .prop-val.norm { color: var(--poe-white); }

    /* Requirements */
    .req-line { font-size: 12px; color: var(--poe-white); }
    .req-unmet { color: var(--bad) !important; }
    .req-val { color: var(--poe-white); }
    .req-val.unmet { color: var(--bad); }

    /* Item level */
    .ilvl-line { font-size: 12px; color: var(--poe-muted); }

    /* Affix section */
    .affix-block { display: flex; flex-direction: column; gap: 2px; }
    .affix-line { font-size: 13px; color: #8888ff; line-height: 1.35; }
    .affix-line.fire      { color: #e05030; }
    .affix-line.cold      { color: #6090e0; }
    .affix-line.lightning { color: #c8b400; }
    .affix-line.chaos     { color: #d02090; }
    .affix-line.life      { color: #d03020; }
    .affix-line.move      { color: var(--good); }
    .affix-line.phys      { color: #c8c8c8; }
    .affix-line.plain     { color: var(--poe-white); }
    .affix-line.neg       { color: var(--bad); opacity: 0.85; }

    /* Flavour / unique text */
    .flavour { font-size: 12px; color: #af8c54; font-style: italic; text-align: center; }

    /* ── RIGHT: Coach panel ────────────────────────────────────── */
    #coach-panel {
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto; max-height: 520px;
    }

    /* Verdict badge */
    #verdict-badge {
      border-radius: 4px; padding: 9px 12px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    #verdict-badge.good { background: rgba(120,212,154,0.12); border: 1px solid rgba(120,212,154,0.35); }
    #verdict-badge.warn { background: rgba(255,209,102,0.10); border: 1px solid rgba(255,209,102,0.35); }
    #verdict-badge.bad  { background: rgba(255,139,139,0.10); border: 1px solid rgba(255,139,139,0.35); }

    .verdict-icon  { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .verdict-inner {}
    .verdict-label { font-size: 15px; font-weight: 800; letter-spacing: 0.01em; }
    .verdict-label.good { color: var(--good); }
    .verdict-label.warn { color: var(--warn); }
    .verdict-label.bad  { color: var(--bad); }
    .verdict-opinion { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; line-height: 1.45; }

    /* Score total */
    #score-total {
      background: rgba(200,162,97,0.03);
      border: 1px solid rgba(200,162,97,0.15);
      border-radius: 4px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 0 2px;
    }
    .score-total-label { font-size: 11px; color: var(--poe-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .score-total-val { font-size: 22px; font-weight: 800; }
    .score-total-val.positive { color: var(--good); }
    .score-total-val.negative { color: var(--bad); }
    .score-total-val.neutral  { color: var(--poe-muted); }
    .score-vs { font-size: 11px; color: var(--poe-muted); font-style: italic; }

    /* Category bars */
    #cat-bars { display: flex; flex-direction: column; gap: 5px; }
    .cat-bar-container {
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 2px 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .cat-bar-container:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .cat-bar-row { display: grid; grid-template-columns: 75px 1fr 32px; gap: 8px; align-items: center; }
    .cat-bar-label { font-size: 11px; color: var(--poe-muted); text-align: right; }
    .cat-bar-track { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.07); position: relative; overflow: visible; }
    .cat-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.25s ease; }
    .cat-bar-fill.positive { background: var(--good); }
    .cat-bar-fill.negative { background: var(--bad); }
    .cat-bar-fill.neutral  { background: var(--poe-muted); }
    .cat-bar-delta { font-size: 11px; text-align: right; font-weight: 700; }
    .cat-bar-delta.positive { color: var(--good); }
    .cat-bar-delta.negative { color: var(--bad); }
    .cat-bar-delta.neutral  { color: var(--poe-muted); }
    .cat-bar-details {
      display: none;
      padding-left: 70px;
      margin-top: 2px;
      margin-bottom: 4px;
      animation: fadeIn 0.15s ease-out;
    }
    .cat-bar-container.expanded .cat-bar-details { display: block !important; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Equipped comparison */
    #equipped-compare {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--poe-border-dim);
      border-radius: 4px; padding: 9px 11px;
    }
    .eq-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--poe-muted); margin-bottom: 5px; }
    .eq-name  { font-size: 13px; color: var(--poe-gold); font-weight: 700; margin-bottom: 4px; }
    .eq-delta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .eq-delta-chip {
      font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 700;
      border: 1px solid transparent;
    }
    .eq-delta-chip.positive { color: var(--good); border-color: rgba(120,212,154,0.35); background: rgba(120,212,154,0.08); }
    .eq-delta-chip.negative { color: var(--bad);  border-color: rgba(255,139,139,0.35); background: rgba(255,139,139,0.08); }
    .eq-delta-chip.neutral  { color: var(--poe-muted); border-color: rgba(255,255,255,0.1); }
    #set-equipped-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 3px;
      background: rgba(92,74,30,0.35); border: 1px solid var(--poe-border);
      color: var(--poe-gold); font-family: inherit; cursor: pointer; margin-top: 7px;
    }
    #set-equipped-btn:hover { background: rgba(92,74,30,0.6); }

    /* Pros / cons */
    .pca-section { margin-top: 8px; }
    .pca-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--poe-gold); font-weight: 700; margin-bottom: 6px; }
    .pca-list { display: flex; flex-direction: column; gap: 4px; }
    .pca-item {
      font-size: 12px; line-height: 1.4; display: flex; gap: 8px; align-items: flex-start;
      padding: 4px 8px; border-radius: 4px; border-left: 2px solid transparent;
    }
    .pca-item.good { border-left-color: var(--good); background: rgba(120,212,154,0.03); }
    .pca-item.bad  { border-left-color: var(--bad); background: rgba(255,139,139,0.03); }
    .pca-item.warn { border-left-color: var(--warn); background: rgba(255,209,102,0.03); }
    .pca-bullet { flex-shrink: 0; font-weight: bold; }
    .pca-item.good .pca-bullet { color: var(--good); }
    .pca-item.bad  .pca-bullet { color: var(--bad); }
    .pca-item.warn .pca-bullet { color: var(--warn); }
    .pca-item.good .pca-text { color: rgba(255,255,255,0.9); }
    .pca-item.bad  .pca-text { color: rgba(255,180,180,0.9); }
    .pca-item.warn .pca-text { color: rgba(255,225,160,0.9); }
    .pca-empty { font-size: 12px; color: var(--poe-muted); font-style: italic; padding: 2px 4px; }

    /* AI coach area */
    #ai-area {
      background: rgba(120,100,255,0.06);
      border: 1px solid rgba(120,100,255,0.2);
      border-radius: 4px; padding: 9px 11px;
      display: none;
    }
    #ai-area.visible { display: block; }
    #ai-text { font-size: 12px; line-height: 1.55; color: rgba(255,255,255,0.8); }
    .ai-summary { font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.95); margin-bottom: 6px; }
    .ai-toggle-btn { color: #9c88ff; font-size: 11px; cursor: pointer; text-decoration: underline; display: inline-block; margin-bottom: 6px; user-select: none; }
    .ai-toggle-btn:hover { color: #bfaaff; }
    .ai-details { border-top: 1px dashed rgba(120,100,255,0.2); padding-top: 6px; font-size: 11.5px; line-height: 1.45; color: rgba(255,255,255,0.8); }
    .ai-details.hidden { display: none; }
    .ai-details-section { margin-top: 6px; }
    .ai-details-title { font-weight: bold; color: #9c88ff; margin-bottom: 2px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
    .ai-details-list { margin: 0; padding-left: 14px; }
    .ai-details-list li { margin-bottom: 2px; }
    #ai-loading { font-size: 12px; color: var(--poe-muted); }

    /* Footer */
    #footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px;
      border-top: 1px solid var(--poe-border-dim);
      background: #0d0b08;
    }
    #footer-hint { font-size: 10px; color: var(--poe-muted); }
    #footer-actions { display: flex; gap: 6px; }
    .foot-btn {
      font-size: 11px; padding: 4px 11px; border-radius: 3px;
      background: rgba(92,74,30,0.25); border: 1px solid var(--poe-border-dim);
      color: var(--poe-gold); font-family: inherit; cursor: pointer;
      transition: background 0.12s;
    }
    .foot-btn:hover { background: rgba(92,74,30,0.55); }
    .foot-btn.primary {
      background: rgba(120,166,255,0.18); border-color: rgba(120,166,255,0.4);
      color: var(--accent);
    }
    .foot-btn.primary:hover { background: rgba(120,166,255,0.32); }

    /* No-build warning */
    #no-build-warn {
      margin: 8px 12px 0;
      padding: 7px 10px; border-radius: 3px;
      background: rgba(255,209,102,0.08); border: 1px solid rgba(255,209,102,0.3);
      font-size: 11px; color: var(--warn); display: none;
    }
  </style>
</head>
<body>

<div id="shell">

  <!-- Title bar -->
  <div id="titlebar">
    <div id="titlebar-left">
      <span>⚗</span>
      <span>PoE2 Gear Coach</span>
    </div>
    <div id="titlebar-right">
      <button class="tb-btn" id="settings-btn">⚙ Settings</button>
      <button class="tb-btn" id="close-btn">✕</button>
    </div>
  </div>

  <!-- No-build warning -->
  <div id="no-build-warn">No build imported — using default Frost Crossbow profile. Open Settings to import.</div>

  <!-- Stage / slot selectors -->
  <div id="selectors">
    <span class="sel-label">Slot</span>
    <select id="slot-select"></select>
    <span class="sel-label">Stage</span>
    <select id="stage-select"></select>
  </div>

  <!-- Urgent Needs Bar -->
  <div id="urgent-needs" style="display:none; padding: 6px 12px; background: #12100c; border-bottom: 1px solid var(--poe-border-dim); font-size: 11px; color: var(--poe-muted); gap: 12px; align-items: center; justify-content: flex-start; flex-wrap: wrap;">
    <span style="color: var(--poe-gold); font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">Needs:</span>
    <span id="need-fire"></span>
    <span id="need-cold"></span>
    <span id="need-lightning"></span>
  </div>

  <!-- Two-column body -->
  <div id="body">

    <!-- LEFT: PoE-style tooltip -->
    <div id="item-tooltip">
      <div class="item-header">
        <div class="item-rarity-bar" id="rarity-bar"></div>
        <div class="item-name" id="item-name">—</div>
        <div class="item-base" id="item-base"></div>
      </div>

      <div class="sep"></div>

      <!-- item level / quality -->
      <div id="item-meta"></div>

      <!-- requirements -->
      <div id="item-reqs"></div>

      <div class="sep" id="sep-reqs" style="display:none"></div>

      <!-- properties (armour, evasion, etc) -->
      <div id="item-props"></div>
      <div class="sep" id="sep-props" style="display:none"></div>

      <!-- implicit mods -->
      <div id="item-implicits" class="affix-block"></div>
      <div class="sep" id="sep-implicits" style="display:none"></div>

      <!-- explicit mods -->
      <div id="item-affixes" class="affix-block"></div>

      <!-- flavour text -->
      <div id="item-flavour" style="display:none">
        <div class="sep"></div>
        <div class="flavour" id="flavour-text"></div>
      </div>
    </div>

    <!-- RIGHT: Coach panel -->
    <div id="coach-panel">

      <!-- Verdict -->
      <div id="verdict-badge" class="warn">
        <div class="verdict-icon" id="verdict-icon">◈</div>
        <div class="verdict-inner">
          <div class="verdict-label warn" id="verdict-label">Analyzing…</div>
          <div class="verdict-opinion" id="verdict-opinion"></div>
        </div>
      </div>

      <!-- Resist Warning Banner -->
      <div id="resist-warning-banner" style="display:none; margin: 10px 0; padding: 8px 12px; border-radius: 4px; background: rgba(224, 80, 48, 0.15); border: 1px solid var(--poe-fire); color: #ff8b8b; font-size: 11px; line-height: 1.4;">
      </div>

      <!-- Score total -->
      <div id="score-total">
        <span class="score-total-label">Build fit</span>
        <span class="score-total-val" id="score-val">—</span>
        <span class="score-vs" id="score-vs"></span>
      </div>

      <!-- Category bars -->
      <div id="cat-bars"></div>

      <!-- Equipped comparison -->
      <div id="equipped-compare" style="display:none">
        <div class="eq-title">vs. your equipped</div>
        <div class="eq-name" id="eq-name"></div>
        <div class="eq-delta-row" id="eq-deltas"></div>
        <div class="eq-confidence" id="eq-confidence" style="font-size: 10px; color: var(--poe-muted); margin-top: 8px; font-style: italic;"></div>
        <button id="set-equipped-btn">Set as equipped ↑</button>
      </div>

      <!-- Why it won/lost -->
      <div class="pca-section" id="why-won-lost-section" style="display:none">
        <div class="pca-title">Why it won/lost</div>
        <div class="pca-list" id="why-won-lost-list"></div>
      </div>

      <!-- Pros -->
      <div class="pca-section">
        <div class="pca-title">Why it fits</div>
        <div class="pca-list" id="pros-list"></div>
      </div>

      <!-- Cons / warnings -->
      <div class="pca-section">
        <div class="pca-title">Watch out for</div>
        <div class="pca-list" id="cons-list"></div>
      </div>

      <!-- AI area -->
      <div id="ai-area">
        <div class="pca-title">AI Coach</div>
        <div id="ai-loading" style="display:none">Asking AI…</div>
        <div id="ai-text"></div>
      </div>

    </div>
  </div><!-- /#body -->

  <!-- Footer -->
  <div id="footer">
    <span id="footer-hint">Ctrl+C on item in-game · Esc to dismiss</span>
    <div id="footer-actions">
      <button class="foot-btn" id="ai-btn">✦ AI Coach</button>
      <button class="foot-btn primary" id="fullcompare-btn">Full Report ↗</button>
    </div>
  </div>

</div><!-- /#shell -->

<script src="parser.js"></script>
<script src="overlay-renderer.js"></script>
</body>
</html>
